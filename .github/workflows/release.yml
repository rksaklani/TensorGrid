name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack and Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.9.1 --activate

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            core/app/node_modules
            core/app/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('core/app/yarn.lock') }}

      - name: Build TensorGrid App
        working-directory: core/app
        run: yarn install && yarn build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        working-directory: core
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          # setup.py strips the leading "v" from RELEASE_VERSION
          export RELEASE_VERSION="${RELEASE_VERSION#v}"
          python -m pip install --upgrade pip build
          # Wheel only — sdist was >1GB (docs tree); pip install uses the wheel.
          python -m build --wheel

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: core/dist/*
          if-no-files-found: error

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Add repository secret: PYPI_API_TOKEN (pypi-... API token from PyPI)
      # Optional: configure PyPI trusted publishing for this repo to use OIDC instead.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
